<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .sub p{
            color: aqua;
            font-style: italic;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: crimson;
        }
        .sub h1,
        .sub h2{
            font-style: italic;
            font-family: Arial, Helvetica, sans-serif;
            color: chartreuse;
        }
        .add p{
            color: aqua;
            background-color: black;
        }
        .add h1,
        .add h2{
            color: chartreuse;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        
        
    </style>
</head>
<body>
    <div class="sub">
        <h1>gud morning</h1>
    <p>it's a rainy day</p>
    <h2>gud afternoon</h2>
    <p>it's a sunny day</p>
    </div>
    <div class="add">
    <h1>gud morning</h1>
    <p>it's a rainy day</p>
    <h2>gud afternoon</h2>
    <p>it's a sunny day</p>
    </div>
</body>
</html>
